<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sista's Cuisine — Catering for Every Gathering</title>
    <meta name="description" content="Fresh, homestyle meals prepared for parties, meetings, and special events. Book Sista's Cuisine for your next gathering." />
    <meta name="author" content="Sista's Cuisine" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="Sista's Cuisine — Catering for Every Gathering" />
    <meta property="og:description" content="Fresh, homestyle meals prepared for parties, meetings, and special events. Book Sista's Cuisine for your next gathering." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sistascuisine.netlify.app/" />
    <meta property="og:image" content="https://sistascuisine.netlify.app/logo.png" />
    <meta property="og:site_name" content="Sista's Cuisine" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sista's Cuisine — Catering for Every Gathering" />
    <meta name="twitter:description" content="Fresh, homestyle meals prepared for parties, meetings, and special events. Book Sista's Cuisine for your next gathering." />
    <meta name="twitter:image" content="https://sistascuisine.netlify.app/logo.png" />
  </head>

  <body>
    <!-- Netlify Forms - Hidden form for detection -->
    <form name="booking" method="POST" data-netlify="true" action="/success.html" style="display:none">
      <input type="hidden" name="form-name" value="booking" />
      <input type="hidden" name="_next" value="/success.html" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="phone" />
      <input type="text" name="date" />
      <input type="text" name="eventType" />
      <input type="text" name="guestCount" />
      <input type="text" name="menuItems" />
      <p hidden><label>Don't fill this out: <input name="bot-field" /></label></p>
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
