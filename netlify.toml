[build]
  command = "npm run build"
  publish = "dist"

# Let success.html handle POST (for form submission redirect)
[[redirects]]
  from = "/success.html"
  to = "/success.html"
  status = 200

# SPA fallback for everything else
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true
