<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Submitted - Sista's Cuisine</title>
  <script>
    // Redirect back to home after form submission
    if (window.location.search.includes('success=true')) {
      window.location.href = '/?booking=success';
    }
  </script>
</head>
<body>
  <form name="booking" data-netlify="true" netlify-honeypot="bot-field" action="/booking.html" method="POST">
    <input type="hidden" name="form-name" value="booking" />
    <p hidden>
      <label>Don't fill this out: <input name="bot-field" /></label>
    </p>
    <input type="hidden" name="name" />
    <input type="hidden" name="email" />
    <input type="hidden" name="phone" />
    <input type="hidden" name="date" />
    <input type="hidden" name="eventType" />
    <input type="hidden" name="guestCount" />
    <input type="hidden" name="menuItems" />
  </form>
</body>
</html>
