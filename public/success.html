<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Confirmed - Sista's Cuisine</title>
  <meta http-equiv="refresh" content="3;url=/">
  <link rel="icon" type="image/png" href="/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 40px 20px;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #166534;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 40px;
    }
    h1 { font-size: 2rem; margin-bottom: 16px; }
    p { color: #a1a1aa; margin-bottom: 24px; }
    a {
      display: inline-block;
      padding: 12px 32px;
      background: #b45309;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }
    a:hover { background: #92400e; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">✓</div>
    <h1>Booking Received!</h1>
    <p>Thank you for your booking request. We'll contact you within 24 hours to confirm your event details.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
